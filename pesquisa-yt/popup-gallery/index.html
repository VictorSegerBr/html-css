<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Popup Image Gallery</h1>
        <div class="image-container">
            <div class="image"><img src="imagens/landscape1.jpg" alt="Landscape 1"></div>
            <div class="image"><img src="imagens/landscape2.jpg" alt="Landscape 2"></div>
            <div class="image"><img src="imagens/landscape3.jpg" alt="Landscape 3"></div>
            <div class="image"><img src="imagens/landscape4.jpg" alt="Landscape 4"></div>
            <div class="image"><img src="imagens/landscape5.jpg" alt="Landscape 5"></div>
            <div class="image"><img src="imagens/landscape6.jpg" alt="Landscape 6"></div>
            <div class="image"><img src="imagens/landscape7.jpg" alt="Landscape 7"></div>
            <div class="image"><img src="imagens/landscape8.jpg" alt="Landscape 8"></div>
            <div class="image"><img src="imagens/landscape9.jpg" alt="Landscape 9"></div>
            <div class="image"><img src="imagens/landscape10.jpg" alt="Landscape 10"></div>
            <div class="image"><img src="imagens/landscape11.jpg" alt="Landscape 11"></div>
            <div class="image"><img src="imagens/landscape12.jpg" alt="Landscape 12"></div>
        </div>

        <div class="popup-image">
            <span>&times;</span>
            <img src="" alt="Popup Image">
            <div class="prev">&#10094;</div>
            <div class="next">&#10095;</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
