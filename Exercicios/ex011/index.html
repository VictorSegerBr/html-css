<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site me vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width:690px )" srcset="imagens/imagem-pequena-256x256.jpg" type="image/jpg">
        <source media="(max-width:1074px )" srcset="imagens/imagem-media-640x427.jpg" type="image/jpg">
        <img src="imagens/imagem-grande-1024x683.jpg" alt="Foto grande">
    </picture>
    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio src="midia/audio.mp3" controls autoplay></audio> <!-- MP3 WAV OGG-->
    <audio preload="metadata" controls>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
